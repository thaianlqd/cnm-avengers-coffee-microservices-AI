  kiem-tra-suc-khoe-ai-service:
    name: Kiem tra suc khoe - AI Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: avengers-coffee-system/services/ai-service

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Cai dat Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cai thu vien Python
        run: pip install -r requirements.txt

      - name: Khoi dong AI service
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          echo $! > ai.pid

      - name: Kiem tra endpoint health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ai/health; then
              exit 0
            fi
            sleep 1
          done
          echo "AI service health check failed"
          exit 1

      - name: Tat AI service
        if: always()
        run: |
          if [ -f ai.pid ]; then
            kill "$(cat ai.pid)" || true
          fi
